name: '🔎 Gemini Review'

on:
  workflow_call:
    inputs:
      additional_context:
        type: 'string'
        description: 'Any additional context from the request'
        required: false

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 7
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: |-
          ${{ vars.APP_ID }}
        uses: 'actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf' # ratchet:actions/create-github-app-token@v2
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Checkout repository'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8' # ratchet:actions/checkout@v6
        with:
          persist-credentials: 'false'

      - name: 'Prepare prompt context'
        shell: 'bash'
        run: |-
          mkdir -p .gemini
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg pr "${PULL_REQUEST_NUMBER}" \
            --arg context "${ADDITIONAL_CONTEXT}" \
            '{repository: $repo, pull_request_number: $pr, additional_context: $context}' > .gemini/context.json
        env:
          REPOSITORY: '${{ github.repository }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          ADDITIONAL_CONTEXT: '${{ inputs.additional_context }}'

      - name: 'Run Gemini pull request review'
        uses: 'jaredmixpanel/run-gemini-cli@c45abde456b44f04791097f631931f36a334655d' # v0.1.22-pinned-2
        id: 'gemini_pr_review'
        env:
          GEMINI_CLI_TRUST_WORKSPACE: 'true'
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-review'
          # Explicitly set the PR number to handle `issue_comment` triggers (which GitHub treats as issues, not PRs).
          # Fall back to issue.number because PRs are issues — when this reusable workflow is
          # invoked from an `issue_comment` event, `pull_request.number` is unset.
          github_pr_number: '${{ github.event.pull_request.number || github.event.issue.number }}'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "create_pending_pull_request_review",
                    "pull_request_read",
                    "submit_pending_pull_request_review"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: '/pr-code-review'

      - name: 'Post Gemini review as comment'
        # Always post a visible comment. /pr-code-review (from the code-review
        # extension) is supposed to create + submit a pending review via the
        # GitHub MCP server, but the upstream's `includeTools` list shipped
        # with the wrong tool names for github-mcp-server >= v0.18 (we use
        # v0.27), so the MCP path silently no-ops. We've fixed the tool list
        # above (create_pending_pull_request_review, submit_pending_pull_request_review),
        # but keep this fallback as a belt-and-suspenders so the response
        # always reaches the PR even if MCP fails. If gemini_response is empty,
        # post a brief notice with a link to the run logs.
        # See: https://github.com/google-github-actions/run-gemini-cli/issues/353
        #      https://github.com/google-github-actions/run-gemini-cli/issues/277
        if: |-
          ${{ always() && !cancelled() }}
        uses: 'actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b' # v7
        env:
          GEMINI_RESPONSE: '${{ steps.gemini_pr_review.outputs.gemini_response }}'
          RUN_URL: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
        with:
          github-token: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          script: |
            const issue_number =
              context.payload.pull_request?.number ?? context.payload.issue?.number;
            if (!issue_number) {
              core.setFailed('Could not determine PR number for comment.');
              return;
            }
            const response = (process.env.GEMINI_RESPONSE || '').trim();
            const runUrl = process.env.RUN_URL;
            const body = response
              ? `${response}\n\n<sub>— Gemini review · [run logs](${runUrl})</sub>`
              : `🤖 Gemini ran but didn't return a textual response. It may have posted a pending review via the GitHub MCP tools above, or you can check the [run logs](${runUrl}) for details.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });
