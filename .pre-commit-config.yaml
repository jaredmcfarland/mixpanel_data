repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        # Walk src/ — threshold + ignore rules come from [tool.interrogate] in pyproject.toml.
        args: [src/]
        pass_filenames: false
